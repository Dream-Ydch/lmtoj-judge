
      - name: 提交结果到仓库
        if: always()
        env:
          MY_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          # 配置 git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${MY_TOKEN}@github.com/Dream-Ydch/lmtoj-judge.git

          # 强制同步到远程最新
          git fetch origin main
          git reset --hard origin/main

          # 根据编译和评测状态生成结果
          mkdir -p results
          if [ "$BUILD_FAILED" == "true" ]; then
            RESULT="CE"
            PASSED=0
            TOTAL=0
          elif [ -z "$RESULT" ]; then
            RESULT="SystemError"
            PASSED=0
            TOTAL=0
          fi

          cat > results/${{ env.JUDGE_ID }}.json <<EOF
          {"judge_id": ${{ env.JUDGE_ID }}, "result": "$RESULT", "passed": $PASSED, "total": $TOTAL}
          EOF

          git add results/
          git commit -m "评测结果 #${{ env.JUDGE_ID }}" || true
          git push origin main

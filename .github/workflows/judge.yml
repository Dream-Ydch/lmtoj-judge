      - name: 评测
        if: env.BUILD_FAILED == 'false'
        run: |
          data_dir="${{ env.PROBLEM_ID }}"
          if [ ! -d "$data_dir" ]; then
            echo "错误：找不到题目 ${{ env.PROBLEM_ID }} 的测试数据目录"
            exit 1
          fi

          passed=0
          total=0
          test_details=""

          for input in "$data_dir"/*.in; do
            if [ ! -f "$input" ]; then continue; fi
            total=$((total + 1))
            base=$(basename "$input" .in)
            output_file="$data_dir/$base.out"
            ans_file="$data_dir/$base.ans"

            if [ -f "$output_file" ]; then
              answer_file="$output_file"
            elif [ -f "$ans_file" ]; then
              answer_file="$ans_file"
            else
              echo "测试点 $base: UKE"
              if [ -z "$test_details" ]; then
                test_details="{\"name\":\"$base\",\"status\":\"UKE\"}"
              else
                test_details="$test_details,{\"name\":\"$base\",\"status\":\"UKE\"}"
              fi
              continue
            fi

            # 用 /usr/bin/time 捕获运行时间和最大内存（单位：秒和KB）
            /usr/bin/time -f "%e %M" -o "time_${base}.txt" timeout 5 ./program < "$input" > output.txt 2>&1
            exit_code=$?

            # 读取时间和内存（如果文件存在）
            time_used=""
            mem_used=""
            if [ -f "time_${base}.txt" ]; then
              read -r time_used mem_used < "time_${base}.txt"
              rm -f "time_${base}.txt"
            fi

            # 处理各种退出码
            if [ $exit_code -eq 124 ]; then
              echo "测试点 $base: TLE"
              status="TLE"
            elif [ $exit_code -eq 255 ]; then
              echo "测试点 $base: UKE (系统错误)"
              status="UKE"
              time_used="0"
              mem_used="0"
            elif [ $exit_code -ne 0 ]; then
              if grep -q "Memory" output.txt || grep -q "Killed" output.txt; then
                echo "测试点 $base: MLE"
                status="MLE"
              else
                echo "测试点 $base: RE"
                status="RE"
              fi
            else
              cp output.txt output_processed.txt
              cp "$answer_file" answer_processed.txt
              
              sed -i 's/ *$//' output_processed.txt
              sed -i 's/ *$//' answer_processed.txt
              
              if [ -s output_processed.txt ] && [ "$(tail -c 1 output_processed.txt | od -An -tx1)" = " 0a" ]; then
                head -c -1 output_processed.txt > output_processed.tmp && mv output_processed.tmp output_processed.txt
              fi
              if [ -s answer_processed.txt ] && [ "$(tail -c 1 answer_processed.txt | od -An -tx1)" = " 0a" ]; then
                head -c -1 answer_processed.txt > answer_processed.tmp && mv answer_processed.tmp answer_processed.txt
              fi
              
              if diff -q output_processed.txt answer_processed.txt > /dev/null 2>&1; then
                echo "测试点 $base: AC"
                status="AC"
                passed=$((passed + 1))
              else
                echo "测试点 $base: WA"
                status="WA"
              fi
              
              rm -f output_processed.txt answer_processed.txt output_processed.tmp answer_processed.tmp
            fi

            # 构建带时间/内存信息的 JSON 对象（若有数据）
            if [ -n "$time_used" ] && [ -n "$mem_used" ]; then
              detail="{\"name\":\"$base\",\"status\":\"$status\",\"time\":$time_used,\"memory\":$mem_used}"
            else
              detail="{\"name\":\"$base\",\"status\":\"$status\"}"
            fi

            if [ -z "$test_details" ]; then
              test_details="$detail"
            else
              test_details="$test_details,$detail"
            fi

            rm -f output.txt
          done

          if [ -n "$test_details" ]; then
            TEST_DETAILS="[$test_details]"
          else
            TEST_DETAILS="[]"
          fi

          echo ""
          echo "通过: $passed / $total"

          if [ $total -gt 0 ]; then
            SCORE=$((passed * 100 / total))
          else
            SCORE=0
          fi
          echo "得分: $SCORE 分"

          if [ $passed -eq $total ] && [ $total -gt 0 ]; then
            RESULT="AC"
          elif [ $total -eq 0 ]; then
            RESULT="NoData"
          else
            RESULT="WA"
          fi

          echo "RESULT=$RESULT" >> $GITHUB_ENV
          echo "PASSED=$passed" >> $GITHUB_ENV
          echo "TOTAL=$total" >> $GITHUB_ENV
          echo "SCORE=$SCORE" >> $GITHUB_ENV
          echo "TEST_DETAILS=$TEST_DETAILS" >> $GITHUB_ENV

- name: 评测
  if: env.BUILD_FAILED == 'false'
  run: |
    data_dir="${{ env.PROBLEM_ID }}"
    if [ ! -d "$data_dir" ]; then
      echo "错误：找不到题目 ${{ env.PROBLEM_ID }} 的测试数据目录"
      exit 1
    fi

    passed=0
    total=0

    for input in "$data_dir"/*.in; do
      if [ ! -f "$input" ]; then continue; fi
      total=$((total + 1))
      base=$(basename "$input" .in)
      output_file="$data_dir/$base.out"
      ans_file="$data_dir/$base.ans"

      if [ -f "$output_file" ]; then
        answer_file="$output_file"
      elif [ -f "$ans_file" ]; then
        answer_file="$ans_file"
      else
        echo "测试点 $base: SKIP"
        continue
      fi

      timeout 5 ./program < "$input" > output.txt 2>&1
      exit_code=$?

      if [ $exit_code -eq 124 ]; then
        echo "测试点 $base: TLE"
      elif [ $exit_code -ne 0 ]; then
        echo "测试点 $base: RE"
      else
        cp output.txt output_processed.txt
        cp "$answer_file" answer_processed.txt
        
        sed -i 's/ *$//' output_processed.txt
        sed -i 's/ *$//' answer_processed.txt
        
        if [ -s output_processed.txt ] && [ "$(tail -c 1 output_processed.txt | od -An -tx1)" = " 0a" ]; then
          head -c -1 output_processed.txt > output_processed.tmp && mv output_processed.tmp output_processed.txt
        fi
        if [ -s answer_processed.txt ] && [ "$(tail -c 1 answer_processed.txt | od -An -tx1)" = " 0a" ]; then
          head -c -1 answer_processed.txt > answer_processed.tmp && mv answer_processed.tmp answer_processed.txt
        fi
        
        if diff -q output_processed.txt answer_processed.txt > /dev/null 2>&1; then
          echo "测试点 $base: AC"
          passed=$((passed + 1))
        else
          echo "测试点 $base: WA"
        fi
        
        rm -f output_processed.txt answer_processed.txt output_processed.tmp answer_processed.tmp
      fi
    done

    echo ""
    echo "通过: $passed / $total"

    # 计算分数
    if [ $total -gt 0 ]; then
      SCORE=$((passed * 100 / total))
    else
      SCORE=0
    fi
    echo "得分: $SCORE 分"

    if [ $passed -eq $total ] && [ $total -gt 0 ]; then
      RESULT="AC"
    elif [ $total -eq 0 ]; then
      RESULT="NoData"
    else
      RESULT="WA"
    fi

    echo "RESULT=$RESULT" >> $GITHUB_ENV
    echo "PASSED=$passed" >> $GITHUB_ENV
    echo "TOTAL=$total" >> $GITHUB_ENV
    echo "SCORE=$SCORE" >> $GITHUB_ENV
